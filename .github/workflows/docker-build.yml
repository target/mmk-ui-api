name: Docker Build (Reusable)

on:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        description: Docker Hub username for docker/login-action (required when inputs.push is true)
        required: false
      DOCKERHUB_TOKEN:
        description: Docker Hub token/password for docker/login-action (required when inputs.push is true)
        required: false
    inputs:
      image:
        description: Fully qualified image name, e.g. ghcr.io/org/repo/service
        required: true
        type: string
      tag_prefix:
        description: Optional tag prefix (useful when multiple services share one repo)
        required: false
        type: string
        default: ""
      context:
        description: Docker build context path (repo-relative)
        required: true
        type: string
      dockerfile:
        description: Dockerfile path (repo-relative)
        required: true
        type: string
      push:
        description: Whether to push the built image(s) to the registry
        required: true
        type: boolean
      pre_build_workdir:
        description: Optional working directory for pre-build step
        required: false
        type: string
        default: ""
      pre_build_cmd:
        description: Optional shell command(s) to run before docker build
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build${{ inputs.push && ' & Push' || '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        if: ${{ inputs.pre_build_cmd != '' }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.13"

      - name: Pre-build
        if: ${{ inputs.pre_build_cmd != '' }}
        working-directory: ${{ inputs.pre_build_workdir }}
        shell: bash
        run: ${{ inputs.pre_build_cmd }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        if: ${{ inputs.push }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute release version
        id: vars
        shell: bash
        run: |
          is_release=false
          version=""

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            prefix="${{ inputs.tag_prefix }}"

            if [[ -n "$prefix" && "$tag" == "$prefix"-v* ]]; then
              version="${tag#"$prefix"-v}"
              is_release=true
            elif [[ -z "$prefix" && "$tag" == v* ]]; then
              version="${tag#v}"
              is_release=true
            fi
          fi

          echo "is_release=$is_release" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ inputs.image }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.version }},enable=${{ steps.vars.outputs.is_release == 'true' }}
            type=sha,prefix=sha-

      - name: Build${{ inputs.push && ' & push' || '' }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ github.workspace }}/${{ inputs.context }}
          file: ${{ github.workspace }}/${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.vars.outputs.version || github.sha }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
